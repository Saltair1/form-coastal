name: Daily Team Run

on:
  schedule:
    - cron: "0 15 * * *"   # 8am PT primary
    - cron: "0 16 * * *"   # 9am PT backstop
    - cron: "0 17 * * *"   # 10am PT backstop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f "output/director-${TODAY}.txt" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Already ran today — skipping."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  run:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: mkdir -p output

      - name: Finance (check cap first)
        run: node scripts/run-agent.js finance

      - name: Check spend cap
        run: |
          if [ -f "output/TEAM_PAUSED.txt" ]; then
            cat output/TEAM_PAUSED.txt
            exit 1
          fi

      - name: Director
        run: node scripts/run-agent.js director

      - name: Scout
        run: node scripts/run-agent.js scout

      - name: Writer
        run: node scripts/run-agent.js writer

      - name: Auditor
        run: node scripts/run-agent.js auditor

      - name: Build dashboard
        run: node scripts/build-dashboard.js

      - name: Commit to main
        run: |
          git config user.name "Form Coastal Bot"
          git config user.email "bot@formcoastal.com"
          git add output/ data/spend.json index.html
          git diff --staged --quiet || git commit -m "chore: daily team run $(date +%Y-%m-%d)"
          git push origin main
