name: Director Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for protected files
        id: protected
        run: |
          git diff --name-only origin/main...HEAD > /tmp/changed.txt
          PROTECTED=false
          while IFS= read -r f; do
            if [[ "$f" == "CLAUDE.md" || "$f" == "roles.json" || "$f" == .github/workflows/* ]]; then
              PROTECTED=true
            fi
          done < /tmp/changed.txt
          echo "protected=${PROTECTED}" >> $GITHUB_OUTPUT

      - name: Block — protected files changed
        if: steps.protected.outputs.protected == 'true'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "**Director: BLOCKED** — This PR changes protected files (CLAUDE.md, roles.json, or workflows). Adam must merge by hand."

      - name: Director reviews and merges
        if: steps.protected.outputs.protected == 'false'
        run: |
          DIFF=$(git diff origin/main...HEAD | head -300)
          CLAUDE_MD=$(cat CLAUDE.md)
          DECISION=$(node -e "
            const https = require('https');
            const body = JSON.stringify({
              model: 'claude-haiku-4-5-20251001',
              max_tokens: 256,
              system: 'You are the Director for Form Coastal. Review this PR diff against CLAUDE.md rules. Reply with exactly APPROVE or REJECT followed by one sentence reason.',
              messages: [{ role: 'user', content: 'CLAUDE.md:\n' + process.env.CLAUDE_MD + '\n\nDiff:\n' + process.env.DIFF }]
            });
            const req = https.request({ hostname: 'api.anthropic.com', path: '/v1/messages', method: 'POST',
              headers: { 'Content-Type': 'application/json', 'x-api-key': process.env.ANTHROPIC_API_KEY, 'anthropic-version': '2023-06-01' }
            }, res => { let d=''; res.on('data',c=>d+=c); res.on('end',()=>{ console.log(JSON.parse(d).content?.[0]?.text || 'REJECT'); }); });
            req.write(body); req.end();
          " CLAUDE_MD="$CLAUDE_MD" DIFF="$DIFF")
          echo "Director: $DECISION"
          if echo "$DECISION" | grep -q "^APPROVE"; then
            gh pr merge ${{ github.event.pull_request.number }} --merge --admin
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "**Director: REJECTED** — $DECISION"
          fi
