name: Rebuild Dashboard

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull latest data
        run: git pull origin main

      - name: Build dashboard
        run: node scripts/build-dashboard.js

      - name: Commit
        run: |
          git config user.name "Form Coastal Bot"
          git config user.email "bot@formcoastal.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: rebuild dashboard"
          git push origin main
